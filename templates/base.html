<!DOCTYPE html>
{% load static %}
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}星河智善人才测评{% endblock %}</title>
    <meta name="description" content="专业人才评估与职业发展平台">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a1628;
            --bg-card: #121e36;
            --bg-card-hover: #1a2a48;
            --primary: #1a3a7a;
            --primary-light: #2a5aaa;
            --accent: #c62828;
            --accent-hover: #e53935;
            --accent-glow: rgba(198,40,40,0.3);
            --text: #e8eaf6;
            --text-light: #90a4ae;
            --text-muted: #546e7a;
            --border: rgba(255,255,255,0.06);
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --radius: 8px;
            --font: 'Segoe UI','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body { font-family:var(--font); background:var(--bg-dark); color:var(--text); line-height:1.6; min-height:100vh; display:flex; flex-direction:column; }
        a { color:var(--accent); text-decoration:none; transition:color 0.2s; }
        a:hover { color:var(--accent-hover); }

        .navbar { background:rgba(10,22,40,0.95); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
        .navbar-inner { max-width:1200px; margin:0 auto; padding:0 24px; height:64px; display:flex; align-items:center; justify-content:space-between; }
        .nav-brand { display:flex; align-items:center; gap:10px; font-size:20px; font-weight:700; color:#fff; }
        .nav-brand i { font-size:24px; color:var(--accent); }
        .nav-links { display:flex; align-items:center; gap:4px; }
        .nav-links a { padding:8px 16px; border-radius:var(--radius); color:var(--text-light); font-weight:500; font-size:14px; transition:all 0.2s; }
        .nav-links a:hover { color:#fff; background:rgba(255,255,255,0.05); }
        .nav-links .btn-accent { background:var(--accent); color:#fff; padding:8px 20px; }
        .nav-links .btn-accent:hover { background:var(--accent-hover); color:#fff; }
        .nav-toggle { display:none; background:none; border:none; font-size:24px; cursor:pointer; color:var(--text); }

        .hero { background:linear-gradient(135deg,#0a1628 0%,#121e36 40%,#1a1830 100%); padding:100px 24px 80px; text-align:center; position:relative; overflow:hidden; }
        .hero::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle at 30% 50%,rgba(198,40,40,0.06) 0%,transparent 50%),radial-gradient(circle at 70% 50%,rgba(26,58,122,0.1) 0%,transparent 50%); pointer-events:none; }
        .hero h1 { font-size:44px; font-weight:800; margin-bottom:16px; letter-spacing:-0.5px; position:relative; }
        .hero h1 span { color:var(--accent); }
        .hero p { font-size:18px; max-width:640px; margin:0 auto 36px; color:var(--text-light); position:relative; line-height:1.8; }
        .hero-actions { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; position:relative; }
        .hero-actions .btn { padding:14px 36px; border-radius:var(--radius); font-size:16px; font-weight:600; border:none; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:8px; }
        .hero-actions .btn-accent { background:var(--accent); color:#fff; }
        .hero-actions .btn-accent:hover { background:var(--accent-hover); transform:translateY(-2px); box-shadow:0 8px 25px var(--accent-glow); }
        .hero-actions .btn-outline { background:transparent; color:#fff; border:2px solid rgba(255,255,255,0.2); }
        .hero-actions .btn-outline:hover { border-color:var(--accent); background:rgba(198,40,40,0.1); }

        .section { max-width:1200px; margin:0 auto; padding:60px 24px; }
        .section-title { font-size:28px; font-weight:700; text-align:center; margin-bottom:8px; }
        .section-subtitle { text-align:center; color:var(--text-light); margin-bottom:40px; font-size:15px; }

        .feature-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:20px; }
        .feature-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:32px 24px; text-align:center; transition:all 0.25s; }
        .feature-card:hover { background:var(--bg-card-hover); transform:translateY(-4px); box-shadow:var(--shadow); border-color:rgba(198,40,40,0.2); }
        .feature-card i { font-size:36px; color:var(--accent); margin-bottom:16px; }
        .feature-card h3 { font-size:17px; margin-bottom:8px; }
        .feature-card p { color:var(--text-light); font-size:14px; line-height:1.7; }

        .cta-section { background:linear-gradient(135deg,#121e36,#1a1830); border-top:1px solid var(--border); border-bottom:1px solid var(--border); padding:60px 24px; text-align:center; }
        .cta-section h2 { font-size:28px; margin-bottom:12px; }
        .cta-section p { color:var(--text-light); margin-bottom:28px; }
        .cta-section .btn-accent { display:inline-flex; align-items:center; gap:8px; padding:16px 44px; background:var(--accent); color:#fff; border-radius:var(--radius); font-weight:600; font-size:18px; transition:all 0.2s; border:none; cursor:pointer; }
        .cta-section .btn-accent:hover { background:var(--accent-hover); transform:translateY(-2px); box-shadow:0 8px 25px var(--accent-glow); }

        .footer { margin-top:auto; border-top:1px solid var(--border); padding:24px 0; text-align:center; color:var(--text-muted); font-size:13px; }

        @media (max-width:768px) {
            .nav-links { display:none; flex-direction:column; position:absolute; top:64px; left:0; right:0; background:rgba(10,22,40,0.98); border-bottom:1px solid var(--border); padding:16px; }
            .nav-links.open { display:flex; }
            .nav-toggle { display:block; }
            .hero h1 { font-size:28px; }
            .hero { padding:60px 20px 48px; }
            .section { padding:40px 16px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="{% url 'assessment:home' %}" class="nav-brand">
                <i class="fas fa-star"></i>
                <span>星河智善人才测评</span>
            </a>
            <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">
                <i class="fas fa-bars"></i>
            </button>
            <div class="nav-links">
                <a href="{% url 'assessment:home' %}">首页</a>
                <a href="{% url 'dashboard:home' %}">管理后台</a>
                <a href="/assessment/">员工作答</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'admin:logout' %}?next=/" class="btn-accent">退出</a>
                {% else %}
                    <a href="{% url 'admin:login' %}?next=/dashboard/" class="btn-accent">登录</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="content">{% block content %}{% endblock %}</main>
    <footer class="footer"><p>&copy; {% now "Y" %} 星河智善人才测评 &mdash; 专业人才评估与发展平台</p></footer>
</body>
</html>
