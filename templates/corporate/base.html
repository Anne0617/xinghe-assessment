<!DOCTYPE html>
{% load static %}
<html lang="zh-hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{% block title %}智善人才测评{% endblock %} - 成就企业人才价值</title>
<link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
<style>
:root {
  --gold: #c9a96e; --gold-dark: #a8884d;
  --navy: #1a2332; --navy-light: #2c3e50;
  --cream: #faf6f0; --cream-light: #fdfbf9; --warm-bg: #f8f4ef;
  --text: #2c3e50; --text-light: #6b7a8a;
  --border: #e8e0d6;
  --font-serif: "Noto Serif SC","STSong","Georgia",serif;
  --font-sans: "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font-sans); color:var(--text); background:var(--cream-light); line-height:1.7; padding-top:72px; }
.navbar { position:fixed; top:0; left:0; right:0; z-index:1000; background:rgba(26,35,50,0.92); backdrop-filter:blur(16px); border-bottom:1px solid rgba(255,255,255,0.06); height:72px; }
.nav-inner { max-width:1200px; margin:0 auto; padding:0 24px; height:72px; display:flex; align-items:center; justify-content:space-between; }
.nav-brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
.nav-brand .logo-icon { width:36px; height:36px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:18px; font-weight:700; }
.nav-brand span { font-size:18px; font-weight:700; color:#fff; letter-spacing:1px; }
.nav-brand small { font-size:10px; color:var(--gold); letter-spacing:2px; display:block; margin-top:-2px; }
.nav-links { display:flex; align-items:center; gap:2px; }
.nav-links a { padding:8px 16px; border-radius:6px; color:rgba(255,255,255,0.7); text-decoration:none; font-size:14px; font-weight:500; transition:all 0.2s; }
.nav-links a:hover { color:#fff; background:rgba(255,255,255,0.06); }
.nav-links a.active { color:var(--gold); background:rgba(201,169,110,0.1); }
.nav-links a.nav-cta { background:var(--gold); color:var(--navy); font-weight:600; padding:8px 18px; border-radius:6px; }
.nav-links a.nav-cta:hover { background:var(--gold-light, #d4af37); }
.nav-toggle { display:none; background:none; border:none; color:#fff; font-size:24px; cursor:pointer; }
.page-hero { background:linear-gradient(135deg,var(--navy),var(--navy-light)); padding:100px 24px 60px; text-align:center; }
.page-hero h1 { font-family:var(--font-serif); font-size:38px; font-weight:700; color:#fff; margin-bottom:12px; }
.page-hero p { font-size:16px; color:rgba(255,255,255,0.55); max-width:560px; margin:0 auto; }
.page-hero .hero-badge { display:inline-block; padding:5px 16px; border:1px solid rgba(201,169,110,0.3); border-radius:20px; color:var(--gold); font-size:11px; letter-spacing:2px; margin-bottom:16px; }
.section { padding:80px 24px; }
.section-alt { background:var(--warm-bg); }
.inner { max-width:1200px; margin:0 auto; }
.section-label { font-size:11px; font-weight:600; color:var(--gold); letter-spacing:3px; margin-bottom:10px; }
.section-title { font-family:var(--font-serif); font-size:34px; font-weight:700; color:var(--text); margin-bottom:14px; }
.section-subtitle { font-size:15px; color:var(--text-light); max-width:600px; }
.btn { display:inline-flex; align-items:center; gap:8px; padding:12px 28px; border-radius:8px; font-size:14px; font-weight:600; text-decoration:none; transition:all 0.2s; }
.btn-gold { background:var(--gold); color:var(--navy); }
.btn-gold:hover { background:#d4af37; }
.btn-outline { border:1.5px solid rgba(255,255,255,0.2); color:#fff; background:transparent; }
.btn-outline:hover { border-color:var(--gold); color:var(--gold); }
.footer { background:var(--navy); padding:50px 24px 28px; }
.footer-inner { max-width:1200px; margin:0 auto; }
.footer-grid { display:grid; grid-template-columns:2fr 1fr 1fr 1fr; gap:40px; margin-bottom:32px; }
.footer-brand h3 { color:#fff; font-size:17px; margin-bottom:8px; }
.footer-brand p { color:rgba(255,255,255,0.4); font-size:13px; max-width:300px; }
.footer-col h4 { color:var(--gold); font-size:12px; letter-spacing:2px; margin-bottom:14px; }
.footer-col a { display:block; color:rgba(255,255,255,0.4); text-decoration:none; font-size:13px; padding:4px 0; transition:all 0.2s; }
.footer-col a:hover { color:var(--gold); }
.footer-bottom { border-top:1px solid rgba(255,255,255,0.06); padding-top:20px; display:flex; justify-content:space-between; flex-wrap:wrap; }
.footer-bottom p { color:rgba(255,255,255,0.25); font-size:12px; }
.footer-bottom .socials a { width:34px; height:34px; border-radius:50%; border:1px solid rgba(255,255,255,0.1); display:inline-flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.35); text-decoration:none; margin-left:8px; }
.footer-bottom .socials a:hover { border-color:var(--gold); color:var(--gold); }
@media (max-width:768px) {
  .nav-links { display:none; flex-direction:column; position:absolute; top:72px; left:0; right:0; background:rgba(26,35,50,0.98); padding:16px; }
  .nav-links.open { display:flex; }
  .nav-toggle { display:block; }
  .footer-grid { grid-template-columns:1fr 1fr; }
  .page-hero h1 { font-size:28px; }
}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-brand"><div class="logo-icon">智</div><div><span>智善人才测评</span><small>ZHI SHAN ASSESSMENT</small></div></a>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')"><i class="fas fa-bars"></i></button>
    <div class="nav-links">
      <a href="/" class="{% if section == 'home' %}active{% endif %}">首页</a>
      <a href="/product/" class="{% if section == 'product' %}active{% endif %}">产品</a>
      <a href="/solutions/" class="{% if section == 'solutions' %}active{% endif %}">解决方案</a>
      <a href="/about/" class="{% if section == 'about' %}active{% endif %}">关于测评</a>
      <a href="/join/" class="{% if section == 'join' %}active{% endif %}">加入我们</a>
      <a href="/dashboard/" class="nav-cta"><i class="fas fa-user-shield"></i> 企业管理员登录</a>
    </div>
  </div>
</nav>
{% block content %}{% endblock %}
<footer class="footer">
  <div class="footer-inner">
    <div class="footer-grid">
      <div class="footer-brand"><h3><i class="fas fa-star"></i> 智善人才测评</h3><p>以科学评估成就企业人才价值。</p></div>
      <div class="footer-col"><h4>产品</h4><a href="/product/">入职人才评估</a><a href="/product/">岗位胜任力评估</a><a href="/product/">团队效能诊断</a></div>
      <div class="footer-col"><h4>关于</h4><a href="/about/">评估理念</a><a href="/about/">核心维度</a></div>
      <div class="footer-col"><h4>支持</h4><a href="#">常见问题</a><a href="#">联系我们</a></div>
    </div>
    <div class="footer-bottom"><p>&copy; 2026 智善人才测评</p><div class="socials"><a href="#"><i class="fab fa-weixin"></i></a><a href="#"><i class="fab fa-weibo"></i></a><a href="#"><i class="fas fa-envelope"></i></a></div></div>
  </div>
</footer>
</body>
</html>
