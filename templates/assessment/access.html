{% extends "base.html" %}
{% load static %}
{% block title %}员工作答入口{% endblock %}
{% block content %}
<style>
.access-wrap { max-width:480px; margin:60px auto; }
.access-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:40px; text-align:center; }
.access-card .icon { width:56px; height:56px; margin:0 auto 16px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; color:#fff; }
.access-card h2 { font-size:20px; margin-bottom:4px; }
.access-card .desc { font-size:13px; color:var(--text-light); margin-bottom:24px; }
.access-card .form-group { margin-bottom:16px; text-align:left; }
.access-card label { display:block; font-size:13px; margin-bottom:6px; color:var(--text-light); }
.access-card input { width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:4px; background:var(--bg-dark); color:var(--text); font-size:15px; text-align:center; letter-spacing:2px; outline:none; }
.access-card input:focus { border-color:var(--accent); }
.access-card .btn-submit { width:100%; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:4px; font-size:15px; font-weight:600; cursor:pointer; }
.access-card .btn-submit:hover { background:var(--accent-hover); }
.error-msg { background:rgba(198,40,40,0.12); color:#ef5350; padding:10px; border-radius:4px; margin-bottom:16px; font-size:13px; }
</style>
<div class="access-wrap">
  <div class="access-card">
    <div class="icon"><i class="fas fa-key"></i></div>
    <h2>员工作答入口</h2>
    <p class="desc">请输入HR提供的测评码开始作答</p>
    {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
    <form method="post">{% csrf_token %}
      <div class="form-group"><label>测评码</label><input type="text" name="code" placeholder="请输入测评码" required autocomplete="off" /></div>
      <div class="form-group"><label>姓名（选填）</label><input type="text" name="name" placeholder="请输入您的姓名" /></div>
      <div class="form-group"><label>手机号（选填）</label><input type="text" name="phone" placeholder="请输入手机号" /></div>
      <div class="form-group"><label>邮箱（选填）</label><input type="email" name="email" placeholder="请输入邮箱" /></div>
      <button type="submit" class="btn-submit"><i class="fas fa-arrow-right"></i> 开始作答</button>
    </form>
  </div>
</div>
{% endblock %}
