<!DOCTYPE html>
<html lang="zh-hans">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正在测评</title>
<link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; background:#f4f7fc; min-height:100vh; }
.topbar { background:#fff; border-bottom:1px solid #e2e8f0; padding:12px 24px; position:sticky; top:0; z-index:100; display:flex; justify-content:space-between; align-items:center; }
.topbar .brand { display:flex; align-items:center; gap:8px; font-weight:600; color:#3a5a8a; }
.topbar .timer { font-size:18px; font-weight:700; color:#e74c3c; }
.content { max-width:800px; margin:0 auto; padding:24px 16px; }
.progress-bar { background:#e2e8f0; border-radius:10px; height:6px; margin-bottom:24px; overflow:hidden; }
.progress-bar .fill { height:100%; background:#4a6fa5; border-radius:10px; transition:width 0.3s; }
.question-card { background:#fff; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.06); padding:24px; margin-bottom:16px; }
.question-card .q-header { display:flex; justify-content:space-between; margin-bottom:12px; }
.question-card .q-category { font-size:12px; color:#fff; background:#4a6fa5; padding:2px 10px; border-radius:10px; }
.question-card .q-number { font-size:12px; color:#7f8c9b; }
.question-card .q-text { font-size:16px; margin-bottom:16px; line-height:1.6; }
.options { display:grid; gap:8px; }
.options label { display:flex; align-items:center; gap:12px; padding:12px 16px; border:2px solid #e2e8f0; border-radius:8px; cursor:pointer; transition:all 0.15s; }
.options label:hover { border-color:#4a6fa5; background:#f8fafc; }
.options label:has(input:checked) { border-color:#4a6fa5; background:#eef3fa; }
.actions { display:flex; gap:12px; margin-top:24px; }
.btn { padding:12px 24px; border-radius:8px; font-size:15px; font-weight:600; border:none; cursor:pointer; transition:all 0.15s; }
.btn-primary { background:#4a6fa5; color:#fff; }
.btn-submit { background:#27ae60; color:#fff; }
.btn-submit:hover { background:#219150; }
</style>
</head>
<body>
<div class="topbar">
    <div class="brand"><i class="fas fa-brain"></i> {{ employee.name }}</div>
    <div class="timer" id="timer">{{ duration_minutes }}:00</div>
</div>
<div class="content">
    <div class="progress-bar"><div class="fill" id="progress" style="width:0%"></div></div>
    <form method="post" action="{% url 'employee_submit' code=assignment.access_code %}" id="assessmentForm">{% csrf_token %}
    {% for q in questions %}
    <div class="question-card" data-qid="{{ q.id }}">
        <div class="q-header">
            <span class="q-number">第{{ forloop.counter }}题 / 共{{ questions|length }}题</span>
            <span class="q-category">{{ q.category }}</span>
        </div>
        <div class="q-text">{{ q.text }}</div>
        <div class="options">
            {% for opt in q.options %}
            <label>
                <input type="radio" name="q_{{ q.id }}" value="{{ opt.id }}" required>
                <span>{{ opt.label }}. {{ opt.text }}</span>
            </label>
            {% endfor %}
        </div>
    </div>
    {% endfor %}
    <div class="actions">
        <button type="button" class="btn btn-outline" onclick="window.scrollTo(0,0)">回到顶部</button>
        <button type="submit" class="btn btn-submit" style="margin-left:auto;" onclick="return confirm('确认提交？')"><i class="fas fa-check"></i> 提交测评</button>
    </div>
    </form>
</div>
<script>
(function() {
    var totalMinutes = {{ duration_minutes }};
    var endTime = new Date(Date.now() + totalMinutes*60000);
    var timerEl = document.getElementById('timer');
    var progressEl = document.getElementById('progress');
    var questions = document.querySelectorAll('.question-card');
    function updateTimer() {
        var diff = endTime - Date.now();
        if (diff <= 0) { timerEl.textContent = '00:00'; document.getElementById('assessmentForm').submit(); return; }
        var m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
        timerEl.textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
        if (diff < 60000) timerEl.style.color = '#e74c3c';
    }
    function updateProgress() {
        var answered = 0;
        questions.forEach(function(q) { if (q.querySelector('input:checked')) answered++; });
        progressEl.style.width = (answered/questions.length*100)+'%';
    }
    document.querySelectorAll('input[type=radio]').forEach(function(el) { el.addEventListener('change', updateProgress); });
    updateProgress();
    setInterval(updateTimer, 1000);
})();
</script>
</body>
</html>
