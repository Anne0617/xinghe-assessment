<!DOCTYPE html>
<html lang="zh-hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智善TIC人才测评</title>
<link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;background:linear-gradient(135deg,#f5f7fa,#e8ecf1);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.container{width:100%;max-width:500px}
.brand{text-align:center;margin-bottom:24px}
.brand .logo{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#c62828,#e53935);color:#fff;padding:12px 24px;border-radius:12px;font-size:18px;font-weight:700;letter-spacing:1px;box-shadow:0 4px 20px rgba(198,40,40,.3)}
.brand .logo i{font-size:22px}
.card{background:#fff;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.08);overflow:hidden}
.notification{padding:20px 24px 16px}
.notification .tag{display:inline-block;background:#c62828;color:#fff;font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:.5px}
.notification h2{font-size:16px;color:#b71c1c;margin-bottom:8px}
.notification p{font-size:13.5px;color:#37474f;line-height:1.8;margin-bottom:4px}
.notification .step{font-size:13.5px;color:#37474f;line-height:1.8;padding-left:0;margin:2px 0}
.notification .step .num{display:inline-block;background:#c62828;color:#fff;font-size:11px;font-weight:700;width:20px;height:20px;line-height:20px;text-align:center;border-radius:50%;margin-right:6px}
.notification .step .bold{font-weight:600}
.notification .optional{color:#90a4ae;font-size:12.5px}
.notification .footnote{margin-top:10px;padding-top:10px;border-top:1px dashed #f0d0d0;font-size:12.5px;color:#78909c;line-height:1.7}
.notification .footnote i{color:#c62828;margin-right:4px}
.notification .signature{margin-top:4px;font-size:12px;color:#b0bec5;text-align:right}
.divider{height:1px;background:#f0f2f5;margin:0 24px}
.form-section{padding:20px 24px 24px}
.form-section h3{font-size:15px;color:#263238;margin-bottom:16px;text-align:center;font-weight:600}
.form-section h3 i{color:#c62828;margin-right:6px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:500;color:#455a64;margin-bottom:4px}
.form-group label .required{color:#c62828;margin-left:2px}
.form-group input{width:100%;padding:12px 14px;border:2px solid #e0e4e8;border-radius:10px;font-size:15px;color:#263238;transition:border-color .2s;outline:none;background:#fafbfc}
.form-group input:focus{border-color:#c62828;background:#fff}
.form-group input.code-input{font-size:20px;letter-spacing:6px;text-align:center;font-weight:600}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,#c62828,#e53935);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(198,40,40,.35)}
.btn-primary:active{transform:translateY(0)}
.error-bar{background:#fbe9e7;color:#c62828;padding:12px 20px;font-size:13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #ffcdd2}
.error-bar i{font-size:16px}
.footer{text-align:center;margin-top:20px;font-size:12px;color:#b0bec5}
@media(max-width:480px){body{padding:12px;align-items:flex-start;padding-top:24px}.brand .logo{font-size:16px;padding:10px 18px}.notification{padding:16px 18px}.form-section{padding:16px 18px 20px}}
</style>
</head>
<body>
<div class="container">
<div class="brand"><div class="logo"><i class="fas fa-star"></i><span>智善TIC · 人才测评</span></div></div>
<div class="card">
<div class="notification">
<div class="tag">测评通知</div>
<p>您好！请按以下步骤完成人才测评：</p>
<div class="step"><span class="num">1</span><span class="bold">点击下方测评链接</span>进入</div>
<div class="step"><span class="num">2</span><span class="bold">填写姓名、手机号</span>（必填）和<span class="optional">邮箱（选填）</span>开始测评<br><span class="optional" style="margin-left:26px;">（请使用本人真实手机号）</span></div>
<div class="footnote"><i class="fas fa-clock"></i>请在规定时间内完成，测评约需 <strong>15-20 分钟</strong>。如有疑问请联系人力资源中心。</div>
<div class="signature">—— 智善TIC生活集团 · 人力资源中心</div>
</div>
{% if error %}
<div class="error-bar"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
{% endif %}
<div class="divider"></div>
<div class="form-section">
<h3><i class="fas fa-pen"></i> 填写信息开始测评</h3>
<form method="post">{% csrf_token %}
<div class="form-group"><label>测评码 <span class="required">*</span></label><input type="text" name="code" class="code-input" placeholder="输入测评码"{% if request.GET.code %} value="{{ request.GET.code }}"{% endif %} maxlength="20" autocomplete="off" autofocus required></div>
<div class="form-group"><label>姓名 <span class="required">*</span></label><input type="text" name="name" placeholder="请输入您的姓名" maxlength="50" autocomplete="off" required></div>
<div class="form-group"><label>手机号 <span class="required">*</span></label><input type="text" name="phone" placeholder="请输入您的手机号" maxlength="20" autocomplete="off" required></div>
<div class="form-group"><label>邮箱 <span style="color:#90a4ae;">（选填）</span></label><input type="email" name="email" placeholder="请输入您的邮箱（选填）" maxlength="100" autocomplete="off"></div>
<button type="submit" class="btn-primary"><i class="fas fa-arrow-right"></i> 开始测评</button>
</form>
</div>
</div>
<div class="footer"><i class="fas fa-shield-alt"></i> 智善TIC生活集团 · 人力资源中心</div>
</div>
</body>
</html>
