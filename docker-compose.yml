 # ============================================
 # docker-compose.yml - 智善TIC人才测评系统
 # ============================================
 # 使用方式：
 #   部署：docker compose up -d
 #   查看日志：docker compose logs -f
 #   停止：docker compose down
 #   初始化数据：docker compose exec tic-app python manage.py seed_data
 #   创建管理员：docker compose exec tic-app python manage.py createsuperuser
 # ============================================
 
 services:
   tic-db:
     image: postgres:16-alpine
     restart: unless-stopped
     volumes:
       - pgdata:/var/lib/postgresql/data
     environment:
       POSTGRES_DB: tic_assessment
       POSTGRES_USER: tic
       POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tic123456}
     env_file:
       - .env
     healthcheck:
       test: ["CMD-SHELL", "pg_isready -U tic -d tic_assessment"]
       interval: 5s
       timeout: 5s
       retries: 5
 
   tic-app:
     image: tic-assessment:latest
     build: .
     restart: unless-stopped
     ports:
       - "${PORT:-8000}:8000"
     depends_on:
       tic-db:
         condition: service_healthy
     environment:
       DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
       DJANGO_DEBUG: "${DJANGO_DEBUG:-False}"
       DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-.zeabur.app,localhost,127.0.0.1}"
       DJANGO_CSRF_TRUSTED_ORIGINS: "${DJANGO_CSRF_TRUSTED_ORIGINS:-https://*.zeabur.app,http://localhost:8000}"
       DATABASE_URL: postgres://tic:${POSTGRES_PASSWORD:-tic123456}@tic-db:5432/tic_assessment
     env_file:
       - .env
     volumes:
       - media_data:/app/media
 
 volumes:
   pgdata:
   media_data:
